# Copy to game_config.ini next to the working directory (often build/Debug when running from IDE).
# background_image: PNG or JPG, stretched to the full logical window (cols x rows x cell_px).
# music_bgm_boss: optional; plays while a Boss archetype enemy is alive (see README).
# music_volume: optional 0-100, default 70. BGM plays only during Battle state (paused on title/victory/defeat).
#
# run_mode: production (default, ship build) or development (battle: X kill all enemies; Num1-9 boss skills).
# run_mode=production
# run_mode=development

# background_image=assets/sprites/enemy/05.Pebblin/IdlePebblin.png
# music_bgm=assets/audio/stage.ogg
# music_bgm_boss=assets/audio/boss.ogg
# music_volume=70
#
# Player damage tiers (optional; defaults tier1 100 x1.2, tier2 300 x1.5). Require tier2_score > tier1_score.
# player_damage_score_tier1=100
# player_damage_mult_tier1=1.2
# player_damage_score_tier2=300
# player_damage_mult_tier2=1.5
